<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bettersurvival">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#A6CE73"/>
      <stop offset="100%" stop-color="#8DB959"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#C7A88E"/>
      <stop offset="100%" stop-color="#A8876C"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0"   width="512" height="188" fill="url(#grass)"/>
    <rect x="0" y="188" width="512" height="324" fill="url(#dirt)"/>
    <rect x="0" y="0"   width="512" height="512" fill="url(#sheen)"/>
  </g>
</svg>
